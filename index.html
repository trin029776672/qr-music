<!DOCTYPE html>
<html>
<head>
  <title>For You ❤️</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="margin:0; text-align:center; font-family:sans-serif; background:#000; color:#fff;">

  <h2 style="margin-top:30px;">สแกนแล้วฟังนะ ❤️</h2>

  <iframe id="ytplayer"
    width="100%" height="300"
    src="https://www.youtube.com/embed/EBJf0slhj5A?autoplay=1&mute=1&playsinline=1"
    frameborder="0"
    allow="autoplay; encrypted-media"
    allowfullscreen>
  </iframe>

  <br><br>

  <button onclick="playSound()" 
    style="padding:12px 20px; font-size:16px; border:none; border-radius:10px;">
    🔊 กดเปิดเสียง
  </button>

  <script>
    function playSound() {
      document.getElementById("ytplayer").src =
      "https://www.youtube.com/embed/EBJf0slhj5A?autoplay=1";
    }
  </script>

</body>
</html>
